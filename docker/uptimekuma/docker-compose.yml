services:
  uptimekuma:
    image: louislam/uptime-kuma:latest
    container_name: uptimekuma
    restart: unless-stopped
    volumes:
      # SQLite data and config — persisted via bind mount (gitignored)
      - ./data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptimekuma.rule=Host(`${UK_HOSTNAME}`)
      - traefik.http.routers.uptimekuma.entrypoints=websecure
      - traefik.http.routers.uptimekuma.tls=true
      - traefik.http.services.uptimekuma-svc.loadbalancer.server.port=3001
    networks:
      - traefik_network

networks:
  traefik_network:
    external: true
