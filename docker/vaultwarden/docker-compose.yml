services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      # DOMAIN is used by Vaultwarden internally (e.g. in emails, attachments).
      # Set this to the public-facing HTTPS URL for this instance.
      - DOMAIN=${DOMAIN}
    volumes:
      - ./vw-data:/data
    labels:
      - traefik.enable=true
      # VW_HOSTNAME is the public subdomain served through Traefik (e.g. vault.yourdomain.com)
      - traefik.http.routers.vaultwarden.rule=Host(`${VW_HOSTNAME}`)
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.tls=true
      - traefik.http.routers.vaultwarden.service=vaultwarden-svc
      - traefik.http.services.vaultwarden-svc.loadbalancer.server.port=80
      - traefik.http.services.vaultwarden-svc.loadbalancer.healthcheck.path=/alive
    networks:
      - traefik_network

networks:
  traefik_network:
    external: true
