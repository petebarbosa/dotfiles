services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      # Named volume for data persistence.
      # To create a database for a new application, connect with a DB client and run:
      # CREATE DATABASE appname;
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 is mapped to localhost:5432 for development access.
    # This allows Rails apps on the host to connect for development.
    # In production, Docker apps connect via the network using hostname "postgres".
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - traefik_network

volumes:
  postgres_data:

networks:
  traefik_network:
    external: true
