services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --save "" --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - traefik_network

volumes:
  redis_data:

networks:
  traefik_network:
    external: true
